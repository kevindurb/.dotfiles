# tmux.conf - tmux settings
# Author: Kevin Durbin
# vim: set fdm=marker expandtab ts=2 sw=2:

set -g default-terminal "xterm-256color-italic"

# {{{ Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sessionist'
# }}}

# {{{ tmux settings
set-option -g allow-rename off    # hold onto the names of windows
set-option -g renumber-windows on # keep the windows numbered sanely
set -g base-index 1               # set windows to start at 1
setw -g pane-base-index 1         # set windows to start as 1

unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# set -g mouse on
# }}}

# {{{ appearance
set -g status-justify centre
set -g status-bg colour08
set -g status-fg colour15
set -g status-interval 2

set -g message-attr none
set -g message-fg colour15
set -g message-bg colour08

set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

setw -g clock-mode-colour colour08
setw -g mode-attr none
setw -g mode-fg colour15
setw -g mode-bg colour08

set -g pane-border-bg colour15
set -g pane-border-fg colour08
set -g pane-active-border-bg colour08
set -g pane-active-border-fg colour08

set -g status-position bottom
set -g status-bg colour15
set -g status-fg colour08
set -g status-attr none
set -g status-left ' #S '
set -g status-right ''
set -g status-right-length 20
set -g status-left-length 20

setw -g window-status-current-bg colour08
setw -g window-status-current-fg colour15
setw -g window-status-current-attr none
setw -g window-status-current-format ' #I:#W '

setw -g window-status-fg colour08
setw -g window-status-bg colour15
setw -g window-status-attr none
setw -g window-status-format ' #I:#W '
# }}}

# {{{ Start TPM
run '~/.tmux/plugins/tpm/tpm'
# }}}
